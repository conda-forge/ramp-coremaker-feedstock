schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.4"

package:
  name: ramp-coremaker
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-coremaker/ramp_coremaker-${{ version }}.tar.gz
  sha256: 59b1b716246a87ae4c076c5c3a153e4d698e8e5bc634ca578b119c4a9ab495b0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - scipy
    - numpy
    - cytoolz
    - pyparsing
    - more-itertools
    - multipledispatch
    - ramp-core
    - ramp-isotopes

tests:
  - python:
      imports:
        - coremaker
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Package for representation of geometric and material compositions of nuclear reactor components
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ramp-coremaker/

extra:
  recipe-maintainers:
    - esheder
